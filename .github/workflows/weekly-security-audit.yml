# Weekly dependency security audit for Carbon SSH.
# Runs every Monday at 06:00 UTC.
# Creates a GitHub issue if vulnerabilities are found.
name: Weekly Security Audit

"on":
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.0

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Stricter than CI (moderate vs high) — catches issues proactively
      - name: Security audit (moderate severity)
        run: pnpm audit --audit-level=moderate

      - name: License compliance check
        run: pnpm licenses list --json > licenses.json
        continue-on-error: true

      - name: Generate SBOM
        run: pnpm sbom

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: weekly-audit-${{ github.run_number }}
          path: |
            licenses.json
            sbom.json
          retention-days: 30

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Weekly security audit found issues — ${new Date().toISOString().slice(0, 10)}`,
              body: `## Weekly Security Audit Failed\n\nThe scheduled dependency audit found vulnerabilities at **moderate** severity or above.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n### Action Required\n1. Review the failing step output\n2. Run \`pnpm audit\` locally to reproduce\n3. Update or replace affected packages\n4. If a known vuln is accepted, document it in \`SUPPLY-CHAIN-AUDIT-LOG.md\``,
              labels: ['security', 'automated']
            })
