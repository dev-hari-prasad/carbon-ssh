appId: com.relay.ssh
productName: Relay SSH
copyright: Copyright © 2026

beforeBuild: electron/before-build.cjs
afterPack: electron/after-pack.cjs

directories:
  output: dist-electron-out
  buildResources: build

files:
  - from: .
    to: .
    filter:
      - "electron/**/*"
      - "package.json"
      - "!**/*.map"
      - "!**/*.sqlite"
      - "!**/*.sqlite-journal"
      - "!src/**/*"
      - "!tsconfig.json"
      - "!postcss.config.mjs"
      - "!eslint.config.js"
      - "!.prettier*"
      - "!.git*"
      - "!node_modules/**/*"
      - "!electron/after-pack.cjs"

extraResources:
  - from: .next/standalone
    to: standalone
  - from: .next/static
    to: standalone/.next/static
  - from: public
    to: standalone/public

asar: true
asarUnpack:
  - "**/better-sqlite3*/**/*"
  - "**/next/**/*"
  - "**/*.node"

win:
  target:
    - nsis
  icon: build/icon.png

mac:
  target:
    - dmg
  icon: build/icon.png
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
