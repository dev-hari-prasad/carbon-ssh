appId: com.relay.ssh
productName: Relay SSH
copyright: Copyright © 2026

beforeBuild: electron/before-build.cjs
afterPack: electron/after-pack.cjs

directories:
  output: dist-electron-out
  buildResources: build

files:
  - "electron/**/*"
  - ".next/**/*"
  - "!.next/dev/**/*"
  - "!.next/cache/**/*"
  - "!.next/node_modules/**/*"
  - "public/**/*"
  - "src/**/*.ts"
  - "src/**/*.tsx"
  - "src/**/*.css"
  - "next.config.mjs"
  - "package.json"
  - "tsconfig.json"
  - "postcss.config.mjs"
  - "!**/*.map"
  - "!**/*.sqlite"
  - "!**/*.sqlite-journal"

asar: false

win:
  target:
    - nsis
  icon: build/icon.ico

mac:
  target:
    - dmg
  icon: build/icon.icns
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
