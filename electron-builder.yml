appId: com.carbon.ssh
productName: Carbon SSH
copyright: Copyright © 2026

beforeBuild: electron/before-build.cjs
afterPack: electron/after-pack.cjs

directories:
  output: dist-electron-out
  buildResources: build

files:
  - from: .
    to: .
    filter:
      - "electron/**/*"
      - "package.json"
      - "!**/*.map"
      - "!**/*.sqlite"
      - "!**/*.sqlite-journal"
      - "!**/*.sqlite-wal"
      - "!**/*.sqlite-shm"
      - "!src/**/*"
      - "!tsconfig.json"
      - "!postcss.config.mjs"
      - "!eslint.config.js"
      - "!.prettier*"
      - "!.git*"
      - "!node_modules/**/*"
      - "!electron/after-pack.cjs"

extraResources:
  - from: .next/standalone
    to: standalone
  - from: .next/static
    to: standalone/.next/static
  - from: public
    to: standalone/public

asar: true
asarUnpack:
  - "**/better-sqlite3*/**/*"
  - "**/next/**/*"
  - "**/*.node"

win:
  target:
    - nsis
  icon: build/icon.png
  # Code signing: supply WIN_CSC_LINK (base64 PKCS#12) and WIN_CSC_KEY_PASSWORD via CI — do not commit certs.

mac:
  target:
    - dmg
  icon: build/icon.png
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  # Developer ID + notarization: CSC_LINK / CSC_KEY_PASSWORD / APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
  notarize:
    teamId: ${env.APPLE_TEAM_ID}

linux:
  target:
    - AppImage
    - deb
  icon: build/icon.png
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
